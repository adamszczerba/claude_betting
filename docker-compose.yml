    shm_size: "2g"
    restart: unless-stopped

  # ───────────────────────────────────────────────────────────────────────
  # Pinnacle scraper  (API-based, lightweight)
  # VPN: ProtonVPN UK  (geo-restricted)
  # ───────────────────────────────────────────────────────────────────────
  pinnacle:
