      - net.ipv6.conf.all.disable_ipv6=0
    volumes:
      # Persist scraped CSVs on the host: match_database/betfair_exchange/<date>/
      - ./match_database/betfair_exchange:/app/db
      # Mount VPN config (same UK proxy as betfair)
      - ./vpns/betfair/manchester1_protonvpn-UK-232.conf:/etc/wireguard/wg0.conf:ro
    # Chrome needs more shared memory
    shm_size: "2g"
    restart: unless-stopped

  # ───────────────────────────────────────────────────────────────────────
  # Bet365 scraper  (Selenium + headless Chrome)
  # VPN: ProtonVPN UK  (same tunnel as Betfair)
  # ───────────────────────────────────────────────────────────────────────
  bet365:
    build:
      context: .
      dockerfile: docker/bet365/Dockerfile
    container_name: scraper-bet365
