      - NET_ADMIN
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.disable_ipv6=0
    volumes:
      # Persist scraped CSVs on the host: match_database/bet365/<date>/
      - ./match_database/bet365:/app/db
      # Mount VPN config (same UK proxy as betfair)
      - ./vpns/betfair/manchester1_protonvpn-UK-232.conf:/etc/wireguard/wg0.conf:ro
